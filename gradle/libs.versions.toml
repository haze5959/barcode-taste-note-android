[versions]
agp = "8.7.3"
kotlin = "2.1.10"
coreKtx = "1.15.0"
lifecycleRuntimeKtx = "2.8.7"
activityCompose = "1.9.3"
composeBom = "2024.12.01"
hilt = "2.53.1"
coroutines = "1.9.0"
auth0 = "2.11.0"
junit = "4.13.2"
junitVersion = "1.2.1"
espressoCore = "3.6.1"
retrofit = "2.11.0"
okhttp = "4.12.0"
kotlinxSerialization = "1.7.3"
# security-crypto: 1.1.0-alpha06 가 현재 최신 published 버전 (stable 1.1.x 미출시).
# stable 라인은 1.0.0 뿐이며 EncryptedSharedPreferences 가 더 오래된 구현이라 다운그레이드 이득 없음.
# Jetpack Security 가 1.1 stable 또는 후속(예: DataStore 암호화) 출시 시 재검토. Auth0 SecureCredentialsManager 가 의존.
securityCrypto = "1.1.0-alpha06"
coil = "2.7.0"
datastore = "1.1.1"
firebaseBom = "33.5.1"
googleServices = "4.4.2"
firebaseCrashlyticsPlugin = "3.0.2"
kakao = "2.21.6"
billing = "7.1.1"
accompanistPermissions = "0.36.0"
appcompat = "1.7.0"
mlkitTranslate = "17.0.3"
mlkitLanguageId = "17.0.6"
mlkitBarcode = "17.3.0"
cameraX = "1.4.1"
browser = "1.8.0"
playReview = "2.0.2"
navigationCompose = "2.8.5"
lifecycleViewmodelCompose = "2.8.7"
lifecycleRuntimeCompose = "2.8.7"
hiltNavigationCompose = "1.2.0"

[libraries]
androidx-core-ktx = { group = "androidx.core", name = "core-ktx", version.ref = "coreKtx" }
androidx-lifecycle-runtime-ktx = { group = "androidx.lifecycle", name = "lifecycle-runtime-ktx", version.ref = "lifecycleRuntimeKtx" }
